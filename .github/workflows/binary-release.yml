name: Binary release

on:
    push:
        tags:
            - "v[0-9]*"

permissions:
    contents: read

env:
    LOKI_REVISION: ${{ github.sha }}
    LOKI_VERSION: ${{ github.ref_name }}

jobs:
    build-linux-arm64:
        name: Build Linux ARM64
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 26
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build executable
              run: pnpm build:node && node scripts/build-executable.ts

            - name: Create archive
              run: tar -czf loki-${{ github.ref_name }}-linux-arm64.tar.gz -C dist-executable loki

            - name: Upload artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: loki-linux-arm64
                  path: loki-${{ github.ref_name }}-linux-arm64.tar.gz
                  compression-level: 0

    build-linux-amd64:
        name: Build Linux AMD64
        runs-on: ubuntu-24.04
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 26
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build executable
              run: pnpm build:node && node scripts/build-executable.ts

            - name: Create archive
              run: tar -czf loki-${{ github.ref_name }}-linux-amd64.tar.gz -C dist-executable loki

            - name: Upload artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: loki-linux-amd64
                  path: loki-${{ github.ref_name }}-linux-amd64.tar.gz
                  compression-level: 0

    build-macos-arm64:
        name: Build macOS ARM64
        runs-on: macos-14
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 26
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build executable
              run: pnpm build:node && node scripts/build-executable.ts

            - name: Create archive
              run: tar -czf loki-${{ github.ref_name }}-macos-arm64.tar.gz -C dist-executable loki

            - name: Upload artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: loki-macos-arm64
                  path: loki-${{ github.ref_name }}-macos-arm64.tar.gz
                  compression-level: 0

    build-windows-amd64:
        name: Build Windows AMD64
        runs-on: windows-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 26
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build executable
              run: pnpm build:node && node scripts/build-executable.ts

            - name: Create archive
              run: tar -czf loki-${{ github.ref_name }}-windows-amd64.tar.gz -C dist-executable loki.exe

            - name: Upload artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: loki-windows-amd64
                  path: loki-${{ github.ref_name }}-windows-amd64.tar.gz
                  compression-level: 0

    release:
        name: Create release
        needs:
            - build-linux-arm64
            - build-linux-amd64
            - build-macos-arm64
            - build-windows-amd64
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
              with:
                  files: artifacts/*.tar.gz
                  fail_on_unmatched_files: true
                  generate_release_notes: true
