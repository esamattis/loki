name: Windows executable tests

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    test-executable:
        name: Self-contained executable
        runs-on: windows-latest
        timeout-minutes: 30
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 26
                  cache: pnpm

            - name: Enable cross-platform package scripts
              run: pnpm config set shell-emulator true

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Chromium
              run: pnpm exec playwright install chromium

            - name: Run executable tests
              run: pnpm test:executable

            - name: Upload Playwright report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: playwright-report-windows-executable
                  path: playwright-report/
                  retention-days: 14
